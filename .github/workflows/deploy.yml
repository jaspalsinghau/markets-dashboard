name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 22 * * 1-5'  # weekdays at 10pm UTC — after US market close
  workflow_dispatch:           # manual trigger from GitHub Actions UI

permissions:
  contents: write  # needed to commit updated CSVs back to main
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - run: npm ci

      - name: Update market data
        run: node scripts/fetch-data.mjs
        env:
          TIINGO_API_KEY: ${{ secrets.TIINGO_API_KEY }}

      - name: Commit updated CSV data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/
          git diff --staged --quiet || git commit -m "chore: update market data [skip ci]"
          git push || true

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_BASE_PATH: /experiments-with-claude

      - uses: actions/configure-pages@v6

      - uses: actions/upload-pages-artifact@v5
        with:
          path: ./out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
